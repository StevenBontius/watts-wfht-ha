[env]
platform = espressif32
framework = arduino
lib_deps =
    mathieucarbou/ESPAsyncWebServer
    bblanchon/ArduinoJson
    lsatan/SmartRC-CC1101-Driver-Lib
    marvinroger/AsyncMqttClient
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

[env:esp32dev]
board = esp32dev
build_flags = -DCORE_DEBUG_LEVEL=2

; ESP32-C3 Super Mini. The native USB port is the built-in USB-Serial/JTAG
; controller (HWCDC), so both flags are required: ARDUINO_USB_MODE=1 selects the
; HWCDC path and ARDUINO_USB_CDC_ON_BOOT=1 maps `Serial` onto it. The devkitm-1
; board JSON sets neither, and CDC_ON_BOOT alone leaves `Serial` undeclared (it
; falls into the USB-OTG USBCDC branch, which is compiled out on the C3). CC1101
; pins are selected automatically in config.h via the CONFIG_IDF_TARGET_ESP32C3
; macro. Flash: pio run -e c3_supermini -t upload
[env:c3_supermini]
board = esp32-c3-devkitm-1
build_flags = -DCORE_DEBUG_LEVEL=2 -DARDUINO_USB_MODE=1 -DARDUINO_USB_CDC_ON_BOOT=1
